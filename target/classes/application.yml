# ============================================================
# 教材管理系统 — Spring Boot 配置文件
# ============================================================

# ---- 服务器端口 ----
server:
  port: 8080

# ---- 数据源：SQL Server 连接 ----
spring:
  datasource:
    # 连接 URL：SQLEXPRESS 使用动态端口 59440
    # 可通过 SQL Server 配置管理器 → TCP/IP → IPAll 查看实际端口
    url: jdbc:sqlserver://localhost:59440;databaseName=TextBookManagement;encrypt=false;trustServerCertificate=true
    username: sa                     # SQL Server 用户名
    password: wm13859022305                 # SQL Server 密码
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

# ---- MyBatis 配置 ----
mybatis:
  # 驼峰命名转换：数据库字段 BookId → Java 属性 bookId
  configuration:
    map-underscore-to-camel-case: false   # 数据库列名本身就是驼峰（BookId），不需要转换
  # 实体类所在包
  type-aliases-package: com.textbook.model.entity

# ---- JWT 密钥配置 ----
jwt:
  secret: TextBookManagementSecretKey2024VeryLongStringForHS256Algorithm
  expiration: 86400000              # Token 有效期：24 小时（毫秒）

# ---- 日志级别 ----
logging:
  level:
    com.textbook: DEBUG             # 项目自身的日志级别
    org.springframework.security: INFO
